name: AI System QA Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - name: 1. 複製 GitHub 專案程式碼到雲端
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境 (用於執行 pytest)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. 在雲端主機安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 🔥 【精華補強】步驟 4：將本地的 Mock Server 打包並用 Docker 啟動
    - name: 4. 使用 Docker 構建並啟動 Mock Server 容器
      run: |
        docker build -t my-ai-mock-server .
        docker run -d -p 8000:8000 --name mock-container my-ai-mock-server
        sleep 5 # 讓 Docker 容器有足夠時間在背景初始化

    - name: 5. 執行全套 Pytest 自動化測試 (對抗 Docker 容器)
      run: |
        pytest -v -s
      continue-on-error: true

    # 🧹 良好的習慣：測試完畢後將 Docker 容器關閉並清除
    - name: 6. 清理 Docker 容器
      run: |
        docker stop mock-container
        docker rm mock-container